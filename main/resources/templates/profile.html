<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户主页 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 2px solid white;
        }
        .profile-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 4px solid #3498db;
        }
        .search-form {
            display: flex; align-items: center; gap: 5px;
        }
        .search-form input {
            width: 180px; padding: 5px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        .search-form button {
            padding: 5px 12px; background: #3498db; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .search-form button:hover { background: #2980b9; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex align-items-center">
                <form action="/search" method="get" class="search-form me-3">
                    <input type="text" name="keyword" placeholder="搜索帖子..." required>
                    <button type="submit">🔍</button>
                </form>
                <a href="/" class="btn btn-outline-light btn-sm me-3">← 返回首页</a>
                <span th:if="${session.user}" class="d-flex align-items-center">
                    <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <a class="text-white text-decoration-none me-2"
                       th:href="@{/user/{id}(id=${session.user.id})}"
                       th:text="${session.user.nickname}">昵称</a>
                    <a href="/my-posts" class="btn btn-sm btn-outline-light me-1">📝</a>
                    <a href="/my-boards" class="btn btn-sm btn-outline-light me-1">📋</a>
                    <a href="/messages" class="btn btn-sm btn-outline-light me-1">💬</a>
                    <a th:if="${session.user.role == 'admin'}" href="/admin/review"
                       class="btn btn-sm btn-outline-warning me-2">📝 审帖</a>
                    <a th:if="${session.user.role == 'admin'}" href="/admin/board-review"
                       class="btn btn-sm btn-outline-warning me-2">📋 审版</a>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
                </span>
                <span th:unless="${session.user}">
                    <a href="/login" class="btn btn-sm btn-outline-light ms-2">登录</a>
                    <a href="/register" class="btn btn-sm btn-outline-light ms-2">注册</a>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card mb-4">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-auto">
                    <img th:src="@{${profileUser.avatar}(v=${#dates.createNow().getTime()})}" class="profile-avatar" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                </div>
                <div class="col">
                    <h2>
                        <span th:text="${profileUser.nickname}">用户昵称</span>
                        <small class="text-muted fs-6">的主页</small>
                    </h2>
                    <p class="text-muted mb-2">
                        用户名：<span th:text="${profileUser.username}">username</span> ·
                        注册于 <span th:text="${#temporals.format(profileUser.createdAt, 'yyyy-MM-dd')}">2026-01-01</span>
                    </p>
                    <p class="mb-2">
                        <a th:href="@{/user/{id}/following(id=${profileUser.id})}" class="text-decoration-none me-3">
                            关注 <span class="badge bg-primary" th:text="${followingCount}">0</span>
                        </a>
                        <a th:href="@{/user/{id}/followers(id=${profileUser.id})}" class="text-decoration-none">
                            粉丝 <span class="badge bg-info" th:text="${followerCount}">0</span>
                        </a>
                    </p>
                    <!-- 操作按钮 -->
                    <div class="mt-2">
                        <!-- 陌生人：关注 + 发私信 -->
                        <span th:if="${session.user != null && session.user.id != profileUser.id}">
                            <a th:if="${!isFollowing}"
                               th:href="@{/user/{id}/follow(id=${profileUser.id})}"
                               class="btn btn-sm btn-outline-primary">➕ 关注</a>
                            <a th:if="${isFollowing}"
                               th:href="@{/user/{id}/unfollow(id=${profileUser.id})}"
                               class="btn btn-sm btn-outline-secondary">✅ 已关注</a>
                            <a th:href="@{/chat/{id}(id=${profileUser.id})}"
                               class="btn btn-sm btn-outline-success ms-1">💬 发私信</a>
                        </span>
                        <!-- 本人：我的帖子、设置、修改头像 -->
                        <span th:if="${session.user != null && session.user.id == profileUser.id}">
                            <a th:href="@{/my-posts}" class="btn btn-outline-info btn-sm">📝 我的帖子</a>
                            <a th:href="@{/user/{id}/settings(id=${profileUser.id})}" class="btn btn-outline-secondary btn-sm ms-1">⚙️ 设置</a>
                            <a th:href="@{/user/{id}/avatar(id=${profileUser.id})}" class="btn btn-outline-primary btn-sm ms-1">🖼️ 修改头像</a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">发布的帖子</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(posts)}" class="text-muted text-center py-3">
                        暂无帖子
                    </div>
                    <div th:each="post : ${posts}" class="mb-2 pb-2 border-bottom">
                        <a th:href="@{/posts/{id}(id=${post.id})}" class="text-decoration-none"
                           th:text="${post.title}">帖子标题</a>
                        <br>
                        <small class="text-muted">
                            <span th:text="${post.likeCount}">0</span> 次点赞 ·
                            <span th:text="${post.commentCount}">0</span> 条评论 ·
                            <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0">发表的评论</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(comments)}" class="text-muted text-center py-3">
                        暂无评论
                    </div>
                    <div th:each="comment : ${comments}" class="mb-2 pb-2 border-bottom">
                        <p class="mb-1" th:text="${comment.content}">评论内容</p>
                        <small class="text-muted">
                            来自帖子：
                            <a th:href="@{/posts/{id}(id=${comment.postId})}" class="text-decoration-none">查看</a> ·
                            <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
