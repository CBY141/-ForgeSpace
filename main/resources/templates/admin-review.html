<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子审核 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">← 返回首页</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>📋 待审核帖子</h3>

    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5 text-muted">
        <p>暂无待审核帖子</p>
    </div>

    <div th:each="post : ${posts}">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title" th:text="${post.title}">标题</h5>
                <p class="text-muted small">
                    发帖用户ID: <span th:text="${post.userId}">1</span> ·
                    板块ID: <span th:text="${post.boardId}">1</span> ·
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
                <p class="card-text" th:text="${post.content}">内容</p>
                <div class="mt-2">
                    <a th:href="@{/admin/review/{id}/approve(id=${post.id})}"
                       class="btn btn-success btn-sm">✅ 通过</a>
                    <a th:href="@{/admin/review/{id}/reject(id=${post.id})}"
                       class="btn btn-danger btn-sm ms-2">❌ 拒绝</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
