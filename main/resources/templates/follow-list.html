<!DOCTYPE html>
<html- lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' - 聚落'">列表 - 聚落</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .nav-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; border: 2px solid white;
    }
    .user-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      object-fit: cover; border: 2px solid #ddd;
    }
    .search-form {
      display: flex; align-items: center; gap: 5px;
    }
    .search-form input {
      width: 180px; padding: 5px 10px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 14px;
    }
    .search-form button {
      padding: 5px 12px; background: #3498db; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    .search-form button:hover { background: #2980b9; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🏠 聚落</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="ms-auto d-flex align-items-center">
        <form action="/search" method="get" class="search-form me-3">
          <input type="text" name="keyword" placeholder="搜索帖子..." required>
          <button type="submit">🔍</button>
        </form>
        <a href="/" class="btn btn-outline-light btn-sm me-3">← 返回首页</a>
        <span th:if="${session.user}" class="d-flex align-items-center">
                    <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <a class="text-white text-decoration-none me-2"
                       th:href="@{/user/{id}(id=${session.user.id})}"
                       th:text="${session.user.nickname}">昵称</a>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
                </span>
        <span th:unless="${session.user}">
                    <a href="/login" class="btn btn-sm btn-outline-light ms-2">登录</a>
                    <a href="/register" class="btn btn-sm btn-outline-light ms-2">注册</a>
                </span>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/">首页</a></li>
      <li class="breadcrumb-item"><a th:href="@{/user/{id}(id=${profileUser.id})}" th:text="${profileUser.nickname}">用户</a></li>
      <li class="breadcrumb-item active" th:text="${title}">列表</li>
    </ol>
  </nav>

  <h3 th:text="${title}">列表</h3>

  <div th:if="${#lists.isEmpty(users)}" class="text-center py-5 text-muted">
    <p>暂无数据</p>
  </div>

  <div th:each="u : ${users}">
    <div class="card mb-2">
      <div class="card-body d-flex align-items-center">
        <img th:src="@{${u.avatar}(v=${#dates.createNow().getTime()})}" class="user-avatar me-3" alt="头像"
             onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
        <div>
          <a th:href="@{/user/{id}(id=${u.id})}" class="fw-bold text-decoration-none" th:text="${u.nickname}">用户</a>
          <br>
          <small class="text-muted" th:text="'@' + ${u.username}">@username</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html->
