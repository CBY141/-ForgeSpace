<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板块详情 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-card { transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
        .nav-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 2px solid white;
        }
        .search-form {
            display: flex; align-items: center; gap: 5px;
        }
        .search-form input {
            width: 180px; padding: 5px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        .search-form button {
            padding: 5px 12px; background: #3498db; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .search-form button:hover { background: #2980b9; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex align-items-center">
                <form action="/search" method="get" class="search-form me-3">
                    <input type="text" name="keyword" placeholder="搜索帖子..." required>
                    <button type="submit">🔍</button>
                </form>
                <a href="/" class="btn btn-outline-light btn-sm me-3">← 返回首页</a>
                <!-- 已登录 -->
                <span th:if="${currentUser}" class="d-flex align-items-center">
                    <img th:src="@{${currentUser.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <a class="text-white text-decoration-none me-2"
                       th:href="@{/user/{id}(id=${currentUser.id})}"
                       th:text="${currentUser.nickname}">昵称</a>
                    <a href="/my-posts" class="btn btn-sm btn-outline-light me-1">📝</a>
                    <a href="/my-boards" class="btn btn-sm btn-outline-light me-1">📋</a>
                    <a href="/messages" class="btn btn-sm btn-outline-light me-1 position-relative">
                        💬
                        <span th:if="${unreadCount != null && unreadCount > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${unreadCount}" style="font-size: 0.5rem;"></span>
                    </a>
                    <a th:if="${currentUser.role == 'admin'}" href="/admin/review"
                       class="btn btn-sm btn-outline-warning me-2">📝 审帖</a>
                    <a th:if="${currentUser.role == 'admin'}" href="/admin/board-review"
                       class="btn btn-sm btn-outline-warning me-2">📋 审版</a>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
                </span>
                <!-- 未登录 -->
                <span th:unless="${currentUser}">
                    <a href="/login" class="btn btn-sm btn-outline-light ms-2">登录</a>
                    <a href="/register" class="btn btn-sm btn-outline-light ms-2">注册</a>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">首页</a></li>
            <li class="breadcrumb-item active" th:text="${board.name}">板块名</li>
        </ol>
    </nav>

    <div class="mb-3">
        <h2 th:text="${board.name}">板块名</h2>
        <p class="text-muted" th:text="${board.description}">板块描述</p>
    </div>

    <div th:if="${currentUser}">
        <div th:if="${board.type == 'official' && currentUser.role != 'admin'}" class="alert alert-warning text-center">
            📛 该板块为官方板块，仅管理员可以发帖。
        </div>
        <div th:unless="${board.type == 'official' && currentUser.role != 'admin'}" class="card mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">发布新帖子</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/boards/{id}/posts(id=${board.id})}" method="post">
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control" placeholder="标题" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="content" class="form-control" rows="4" placeholder="内容" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">发布</button>
                </form>
            </div>
        </div>
    </div>
    <div th:unless="${currentUser}" class="text-center py-3">
        <a href="/login" class="btn btn-outline-primary">登录后发帖</a>
    </div>

    <h4>帖子列表 <small class="text-muted">（共 <span th:text="${totalPosts}">0</span> 篇）</small></h4>

    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5 text-muted">
        <p>这个板块还没有帖子，快来发第一个吧！</p>
    </div>

    <div th:each="post : ${posts}">
        <div class="card post-card mb-3">
            <div class="card-body">
                <h5 class="card-title">
                    <a th:href="@{/posts/{id}(id=${post.id})}" class="text-decoration-none text-dark"
                       th:text="${post.title}">标题</a>
                </h5>
                <p class="card-text text-muted small">
                    <a th:href="@{/user/{id}(id=${post.userId})}" class="text-decoration-none text-muted"
                       th:text="${@userNicknameUtil.getNickname(post.userId)}">用户</a> ·
                    <span th:text="${post.likeCount}">0</span> 次点赞 ·
                    <span th:text="${post.commentCount}">0</span> 条评论 ·
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
                <p class="card-text text-muted" th:text="${#strings.abbreviate(post.content, 120)}"></p>
            </div>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/boards/{id}(id=${board.id}, page=${currentPage - 1})}">上一页</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/boards/{id}(id=${board.id}, page=${i})}" th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/boards/{id}(id=${board.id}, page=${currentPage + 1})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>

<div th:if="${postSuccess}" id="postSuccessToast" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast align-items-center text-bg-success border-0 show" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" th:text="${postSuccess}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
