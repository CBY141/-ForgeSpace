<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑帖子 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">← 返回首页</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">首页</a></li>
            <li class="breadcrumb-item"><a th:href="@{/boards/{id}(id=${post.boardId})}">返回板块</a></li>
            <li class="breadcrumb-item"><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">帖子</a></li>
            <li class="breadcrumb-item active">编辑</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header bg-warning text-white">
            <h4 class="mb-0">✏️ 编辑帖子</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" name="title" class="form-control" th:value="${post.title}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <textarea name="content" class="form-control" rows="8" required th:text="${post.content}"></textarea>
                </div>
                <button type="submit" class="btn btn-warning">保存修改</button>
                <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary ms-2">取消</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
