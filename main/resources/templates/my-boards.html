<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的板块 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 2px solid white;
        }
        .search-form {
            display: flex; align-items: center; gap: 5px;
        }
        .search-form input {
            width: 180px; padding: 5px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        .search-form button {
            padding: 5px 12px; background: #3498db; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex align-items-center">
                <form action="/search" method="get" class="search-form me-3">
                    <input type="text" name="keyword" placeholder="搜索帖子..." required>
                    <button type="submit">🔍</button>
                </form>
                <a href="/" class="btn btn-outline-light btn-sm me-3">← 返回首页</a>
                <span th:if="${session.user}" class="d-flex align-items-center">
                    <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <a class="text-white text-decoration-none me-2"
                       th:href="@{/user/{id}(id=${session.user.id})}"
                       th:text="${session.user.nickname}">昵称</a>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
                </span>
                <span th:unless="${session.user}">
                    <a href="/login" class="btn btn-sm btn-outline-light ms-2">登录</a>
                    <a href="/register" class="btn btn-sm btn-outline-light ms-2">注册</a>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-3">📋 我的板块</h3>

    <div th:if="${#lists.isEmpty(boards)}" class="text-center py-5 text-muted">
        <p>你还没有创建过板块</p>
    </div>

    <div th:each="board : ${boards}">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title" th:text="${board.name}">板块名</h5>
                <p class="text-muted small">
                    类型: <span th:text="${board.type}">normal</span> ·
                    <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
                <div class="mt-2">
                    <span th:if="${board.status == 0}" class="badge bg-warning text-dark">⏳ 待审核</span>
                    <span th:if="${board.status == 1}" class="badge bg-success">✅ 已通过</span>
                    <span th:if="${board.status == 2}" class="badge bg-danger">❌ 已拒绝</span>
                </div>
                <p class="card-text text-muted mt-2" th:text="${board.description}">描述</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
