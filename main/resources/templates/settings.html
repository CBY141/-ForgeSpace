<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">← 返回首页</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">首页</a></li>
            <li class="breadcrumb-item"><a th:href="@{/user/{id}(id=${profileUser.id})}" th:text="${profileUser.nickname}">用户</a></li>
            <li class="breadcrumb-item active">个人设置</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- 修改昵称 -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">✏️ 修改昵称</h5>
                </div>
                <div class="card-body">
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/user/{id}/settings(id=${profileUser.id})}" method="post">
                        <input type="hidden" name="action" value="nickname">
                        <div class="mb-3">
                            <label class="form-label">新昵称</label>
                            <input type="text" name="nickname" class="form-control" th:value="${profileUser.nickname}" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">保存昵称</button>
                    </form>
                </div>
            </div>

            <!-- 修改密码 -->
            <div class="card">
                <div class="card-header bg-warning">
                    <h5 class="mb-0">🔒 修改密码</h5>
                </div>
                <div class="card-body">
                    <div th:if="${pwdError}" class="alert alert-danger" th:text="${pwdError}"></div>
                    <div th:if="${pwdSuccess}" class="alert alert-success" th:text="${pwdSuccess}"></div>
                    <form th:action="@{/user/{id}/settings(id=${profileUser.id})}" method="post">
                        <input type="hidden" name="action" value="password">
                        <div class="mb-3">
                            <label class="form-label">旧密码</label>
                            <input type="password" name="oldPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">修改密码</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
