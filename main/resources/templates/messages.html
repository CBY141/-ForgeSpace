<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私信 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">← 返回首页</a>
            <span th:if="${session.user}" class="ms-3">
                <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                     onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                <a th:href="@{/user/{id}(id=${session.user.id})}" th:text="${session.user.nickname}" class="text-white text-decoration-none me-2"></a>
                <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
            </span>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>💬 私信</h3>

    <div th:if="${#lists.isEmpty(chats)}" class="text-center py-5 text-muted">
        <p>暂无私聊消息</p>
    </div>

    <div th:each="chat : ${chats}">
        <div class="card mb-2">
            <a th:href="@{/chat/{id}(id=${chat.user.id})}" class="text-decoration-none text-dark">
                <div class="card-body d-flex align-items-center">
                    <img th:src="@{${chat.user.avatar}(v=${#dates.createNow().getTime()})}" class="chat-avatar me-3" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <div>
                        <strong th:text="${chat.user.nickname}">用户</strong>
                        <br>
                        <small class="text-muted" th:text="${chat.lastMessage.content}">最后一条消息</small>
                        <br>
                        <small class="text-muted" th:text="${#temporals.format(chat.lastMessage.createdAt, 'MM-dd HH:mm')}"></small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
