<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-card { transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
        .nav-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; border: 2px solid white;
        }
        .search-form {
            display: flex; align-items: center; gap: 5px;
        }
        .search-form input {
            width: 180px; padding: 5px 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        .search-form button {
            padding: 5px 12px; background: #3498db; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .search-form button:hover { background: #2980b9; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="ms-auto d-flex align-items-center">
                <form action="/search" method="get" class="search-form me-3">
                    <input type="text" name="keyword" placeholder="搜索帖子..." required>
                    <button type="submit">🔍</button>
                </form>
                <a href="/" class="btn btn-outline-light btn-sm me-3">← 返回首页</a>
                <span th:if="${session.user}" class="d-flex align-items-center">
                    <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                    <a class="text-white text-decoration-none me-2"
                       th:href="@{/user/{id}(id=${session.user.id})}"
                       th:text="${session.user.nickname}">昵称</a>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
                </span>
                <span th:unless="${session.user}">
                    <a href="/login" class="btn btn-sm btn-outline-light ms-2">登录</a>
                    <a href="/register" class="btn btn-sm btn-outline-light ms-2">注册</a>
                </span>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">首页</a></li>
            <li class="breadcrumb-item active">搜索 "<span th:text="${keyword}">关键字</span>"</li>
        </ol>
    </nav>

    <h3>搜索结果 <small class="text-muted">（共 <span th:text="${totalPosts}">0</span> 篇）</small></h3>

    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5 text-muted">
        <p>没有找到相关帖子</p>
    </div>

    <div th:each="post : ${posts}">
        <div class="card post-card mb-3">
            <div class="card-body">
                <h5 class="card-title">
                    <a th:href="@{/posts/{id}(id=${post.id})}" class="text-decoration-none text-dark"
                       th:text="${post.title}">标题</a>
                </h5>
                <p class="card-text text-muted small">
                    <a th:href="@{/user/{id}(id=${post.userId})}" class="text-decoration-none text-muted"
                       th:text="${@userNicknameUtil.getNickname(post.userId)}">用户</a> ·
                    板块ID: <span th:text="${post.boardId}">1</span> ·
                    <span th:text="${post.commentCount}">0</span> 条评论 ·
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
                <p class="card-text text-muted" th:text="${#strings.abbreviate(post.content, 120)}"></p>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage - 1})}">上一页</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${i})}" th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage + 1})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
