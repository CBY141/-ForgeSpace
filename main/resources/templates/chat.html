<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'与 ' + ${otherUser.nickname} + ' 的私信 - 聚落'">私信 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .message-bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; word-break: break-word; }
        .message-sent { background: #3498db; color: white; margin-left: auto; }
        .message-received { background: #ecf0f1; color: #2c3e50; }
        .chat-box { height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fafafa; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/messages" class="btn btn-outline-light btn-sm me-2">← 返回私信</a>
            <span th:if="${session.user}">
                <img th:src="@{${session.user.avatar}(v=${#dates.createNow().getTime()})}" class="nav-avatar me-2" alt="头像"
                     onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">
                <a th:href="@{/user/{id}(id=${session.user.id})}" th:text="${session.user.nickname}" class="text-white text-decoration-none me-2"></a>
                <a href="/logout" class="btn btn-sm btn-outline-danger">退出</a>
            </span>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4>与 <span th:text="${otherUser.nickname}">用户</span> 的私信</h4>

    <!-- 互关状态提示 -->
    <div th:if="${mutualFollow}" class="alert alert-success py-1">✅ 你们已互相关注，可自由聊天</div>
    <div th:unless="${mutualFollow}" class="alert alert-warning py-1">
        ⚠️ 对方尚未回复，你还能发送 <strong th:text="${remaining}">3</strong> 条消息（每条最多50字）
    </div>

    <!-- 消息列表 -->
    <div class="chat-box mb-3" id="chatBox">
        <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
            暂无消息，发送第一条私信吧！
        </div>
        <div th:each="msg : ${messages}">
            <div class="d-flex" th:classappend="${msg.senderId == session.user.id} ? 'justify-content-end' : 'justify-content-start'">
                <div class="message-bubble"
                     th:classappend="${msg.senderId == session.user.id} ? 'message-sent' : 'message-received'"
                     th:text="${msg.content}"></div>
            </div>
        </div>
    </div>

    <!-- 错误提示 -->
    <div th:if="${msgError}" class="alert alert-danger py-1" th:text="${msgError}"></div>

    <!-- 发送框 -->
    <form th:if="${canSend}" th:action="@{/chat/{id}/send(id=${otherUser.id})}" method="post" class="d-flex gap-2">
        <input type="text" name="content" class="form-control" placeholder="输入消息（最多50字）..." maxlength="50" required>
        <button type="submit" class="btn btn-primary">发送</button>
    </form>
    <div th:unless="${canSend}" class="alert alert-danger">
        🚫 你已达到陌生人消息上限（3条），请等待对方回复或互相关注后再聊。
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
