<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>聚落 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; }
        .header a { color: #3498db; text-decoration: none; margin: 0 10px; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .board-card {
            background: white; border-radius: 8px; padding: 20px;
            margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .board-card h3 { color: #2c3e50; margin-bottom: 8px; }
        .board-card h3 a { color: #2c3e50; text-decoration: none; }
        .board-card h3 a:hover { color: #3498db; }
        .board-card p { color: #7f8c8d; font-size: 14px; }
        .btn {
            display: inline-block; padding: 10px 20px; background: #3498db;
            color: white; text-decoration: none; border-radius: 5px; margin-top: 15px;
        }
        .btn:hover { background: #2980b9; }
        .auth-links { margin-top: 10px; }
    </style>
</head>
<body>
<div class="header">
    <h1>🏠 聚落 ForgeSpace</h1>
    <p>你的兴趣社区</p>
    <div class="auth-links" th:if="${session.user}">
        欢迎，<span th:text="${session.user.nickname}">用户</span> |
        <a href="/logout">退出</a>
    </div>
    <div class="auth-links" th:unless="${session.user}">
        <a href="/register">注册</a>
        <a href="/login">登录</a>
    </div>
</div>

<div class="container">
    <h2 style="margin-bottom: 20px;">所有板块</h2>

    <!-- 这里循环显示板块 -->
    <div th:each="board : ${boards}">
        <div class="board-card">
            <h3>
                <a th:href="@{/boards/{id}(id=${board.id})}" th:text="${board.name}">板块名</a>
            </h3>
            <p th:text="${board.description}">板块描述</p>
            <p style="font-size: 12px; color: #95a5a6;">
                创建于 <span th:text="${board.createdAt}">2026-01-01</span>
            </p>
        </div>
    </div>

    <!-- 如果没有板块 -->
    <div th:if="${#lists.isEmpty(boards)}">
        <p style="color: #7f8c8d; text-align: center; padding: 50px;">
            还没有板块，快去创建一个吧！
        </p>
    </div>
</div>
</body>
</html>
