<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改头像 - 聚落</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏠 聚落</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">← 返回首页</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">首页</a></li>
            <li class="breadcrumb-item"><a th:href="@{/user/{id}(id=${profileUser.id})}" th:text="${profileUser.nickname}">用户</a></li>
            <li class="breadcrumb-item active">修改头像</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">🖼️ 修改头像</h5>
                </div>
                <div class="card-body text-center">
                    <p class="text-muted">当前头像</p>
                    <img th:src="@{${profileUser.avatar}(v=${#dates.createNow().getTime()})}"
                         class="rounded-circle mb-3"
                         width="120" height="120"
                         style="object-fit: cover; border: 3px solid #3498db;"
                         alt="头像"
                         onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/initials/svg?seed=default';">

                    <form th:action="@{/user/{id}/avatar(id=${profileUser.id})}" method="post" enctype="multipart/form-data">
                        <div class="mb-3 text-start">
                            <label class="form-label">选择本地图片</label>
                            <input type="file" name="file" class="form-control" accept="image/*" required>
                            <div class="form-text">支持 JPG、PNG、GIF，大小不超过 2MB</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">上传并保存</button>
                    </form>

                    <hr>
                    <p class="text-muted">或者恢复默认头像</p>
                    <a th:href="@{/user/{id}/avatar/default(id=${profileUser.id})}"
                       class="btn btn-outline-secondary btn-sm">
                        🔄 恢复默认头像
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
